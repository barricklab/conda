name: Build and publish breseq-prerelease and CNery-prerelease

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a build even if there are no new commits'
        type: boolean
        default: false
  schedule:
    - cron: '13 7 * * *'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_new_commit: ${{ steps.check.outputs.has_new_commit }}
      remote_sha: ${{ steps.check.outputs.remote_sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Check for new breseq commit
        id: check
        env:
          FORCE_BUILD: ${{ github.event.inputs.force }}
        run: bash scripts/check_new_commit.sh

  check-cnery:
    runs-on: ubuntu-latest
    outputs:
      has_new_commit: ${{ steps.check.outputs.has_new_commit }}
      remote_sha: ${{ steps.check.outputs.remote_sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Check for new CNery commit
        id: check
        env:
          FORCE_BUILD: ${{ github.event.inputs.force }}
        run: bash scripts/check_cnery_commit.sh

  build:
    needs: check
    if: needs.check.outputs.has_new_commit == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            subdir: linux-64
          - os: ubuntu-24.04-arm
            subdir: linux-aarch64
          - os: macos-14
            subdir: osx-arm64
          - os: macos-15-intel
            subdir: osx-64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          channels: conda-forge,bioconda
          channel-priority: strict
          auto-activate-base: true

      - name: Install conda-build
        shell: bash -el {0}
        run: conda install -y -n base conda-build conda-index

      - name: Build breseq-prerelease (${{ matrix.subdir }})
        shell: bash -el {0}
        env:
          BRESEQ_COMMIT_SHA: ${{ needs.check.outputs.remote_sha }}
        run: |
          conda build recipe/breseq-prerelease \
            -c https://barricklab.github.io/conda/ \
            -c conda-forge -c bioconda \
            --output-folder ./built-pkgs

      - name: Upload built package
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.subdir }}
          path: built-pkgs/${{ matrix.subdir }}/*.conda
          if-no-files-found: error

  build-cnery:
    needs: check-cnery
    if: needs.check-cnery.outputs.has_new_commit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          channels: conda-forge,bioconda
          channel-priority: strict
          auto-activate-base: true

      - name: Install conda-build
        shell: bash -el {0}
        run: conda install -y -n base conda-build conda-index

      - name: Build CNery-prerelease (noarch)
        shell: bash -el {0}
        env:
          CNERY_COMMIT_SHA: ${{ needs.check-cnery.outputs.remote_sha }}
        run: |
          conda build recipe/CNery-prerelease \
            -c conda-forge -c bioconda \
            --output-folder ./built-pkgs

      - name: Upload built package
        uses: actions/upload-artifact@v7
        with:
          name: pkg-noarch
          path: built-pkgs/noarch/*.conda
          if-no-files-found: error

  publish:
    needs: [check, check-cnery, build, build-cnery]
    if: |
      always() &&
      (needs.check.outputs.has_new_commit == 'true' || needs.check-cnery.outputs.has_new_commit == 'true') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.build-cnery.result == 'success' || needs.build-cnery.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          pattern: pkg-*
          path: downloaded-pkgs

      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          channels: conda-forge
          activate-environment: index-env

      - name: Install conda-index
        shell: bash -el {0}
        run: conda install -y conda-index

      - name: Checkout gh-pages into ./channel
        run: |
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add channel gh-pages
          else
            mkdir -p channel
            git -C channel init -q
            git -C channel checkout -q --orphan gh-pages
          fi

      - name: Merge new packages into channel (without deleting existing)
        shell: bash -el {0}
        run: bash scripts/publish_channel.sh

      - name: conda index
        shell: bash -el {0}
        run: python -m conda_index channel/

      - name: Commit and push gh-pages
        working-directory: channel
        run: |
          touch .nojekyll
          git add -A
          git -c user.name="breseq-prerelease-bot" \
              -c user.email="actions@github.com" \
              commit -m "Publish packages: breseq=${{ needs.check.outputs.remote_sha }} CNery=${{ needs.check-cnery.outputs.remote_sha }}"
          git push origin gh-pages

      - name: Update state files on main
        run: |
          git fetch origin main
          git reset --hard origin/main
          if [[ "${{ needs.check.outputs.has_new_commit }}" == "true" ]]; then
            cat > state/last-published-commit.json <<EOF
          {
            "breseq_commit_sha": "${{ needs.check.outputs.remote_sha }}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF
          fi
          if [[ "${{ needs.check-cnery.outputs.has_new_commit }}" == "true" ]]; then
            cat > state/last-published-cnery-commit.json <<EOF
          {
            "cnery_commit_sha": "${{ needs.check-cnery.outputs.remote_sha }}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF
          fi
          git add state/
          git -c user.name="breseq-prerelease-bot" \
              -c user.email="actions@github.com" \
              commit -m "Update last-published-commit state [skip ci]"
          git push origin HEAD:main
