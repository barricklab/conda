{% set raw_tag = GIT_DESCRIBE_TAG if GIT_DESCRIBE_TAG else "v0.0.0" %}
{% set tag_stripped = raw_tag[1:] if raw_tag.startswith("v") else raw_tag %}
{% set dev_count = GIT_DESCRIBE_NUMBER | default("0", true) %}
{% set short_hash = GIT_DESCRIBE_HASH | default("", true) %}
{% set version = tag_stripped if dev_count == "0" else tag_stripped ~ ".dev" ~ dev_count ~ "+" ~ short_hash %}

package:
  name: breseq-prerelease
  version: {{ version }}

source:
  git_url: https://github.com/barricklab/breseq.git
  git_rev: {{ environ.get("BRESEQ_COMMIT_SHA", "HEAD") }}
  git_depth: -1

build:
  number: 0
  string: {{ short_hash if short_hash else "local" }}
  script_env:
    - BRESEQ_COMMIT_SHA

requirements:
  build:
    - {{ compiler('cxx') }}
    - sysroot_linux-64 2.17      # [linux64]
    - sysroot_linux-aarch64 2.17  # [aarch64]    
    - autoconf
    - automake
    - libtool
    - pkg-config
    - m4
    - make
  host:
    - __glibc >=2.17  # [linux]
    - libdl  # [linux]
    - zlib 1.3.2.*
    - miniz 3.1.1.*
    - htslib >=1.10
  run:
    - htslib >=1.10
    - samtools 1.23.1.*
    - bowtie2 2.5.5.*
    - gnuplot 6.0.4.*
    - phylip 3.697.*
    - cnery-prerelease

test:
  commands:
    - breseq --help 2>&1 | grep Usage
    - gdtools --help 2>&1 | grep Usage

about:
  home: https://github.com/barricklab/breseq
  license: GPL-2.0-or-later
  license_family: GPL3
  summary: "Automated pre-release build of breseq tracking barricklab/breseq's master branch (not for production use; see the breseq bioconda package for stable releases)."
